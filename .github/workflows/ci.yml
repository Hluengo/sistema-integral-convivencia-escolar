name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint (TypeScript)
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build web
        run: npm run build:web
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: public-anon-key-for-ci
          VITE_ALLOW_LOCAL_DEMO: 'true'
